services:
  postgres:
    image: postgres:16-alpine
    container_name: shareliveloc-db
    environment:
      POSTGRES_USER: shareliveloc
      POSTGRES_PASSWORD: shareliveloc
      POSTGRES_DB: shareliveloc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shareliveloc"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./shareliveloc-api
      dockerfile: Dockerfile
    container_name: shareliveloc-api
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: shareliveloc
      DB_PASSWORD: shareliveloc
      DB_NAME: shareliveloc
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
